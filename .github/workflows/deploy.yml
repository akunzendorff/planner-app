name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-package-lock --force
      - run: npm run build
        env:
          VITE_SUPABASE_PROJECT_ID: ninbruceyvcjthyyjwjx
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pbmJydWNleXZjanRoeXlqd2p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMDAzNTYsImV4cCI6MjA5ODU3NjM1Nn0.QaymNaMqtDhOkzDXTU7n8I_YcU2lN0e83ZLTwGl3W1k
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
