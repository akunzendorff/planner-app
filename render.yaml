services:
  - type: web
    name: planner-api
    runtime: docker
    repo: https://github.com/akunzendorff/planner-app
    dockerfilePath: api/Dockerfile
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://akunzendorff.github.io/planner-app
      - key: PORT
        value: "3000"
